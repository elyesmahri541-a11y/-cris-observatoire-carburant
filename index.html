<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence Eco | Observatoire Live 76</title>
    <script src="https://pl28952276.profitablecpmratenetwork.com/68/19/1f/68191f7887eac7841580d0ccead48e50.js"></script>
    <style>
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #1e293b;
            --primary: #0f172a; --accent: #3b82f6; --secondary: #fbbf24;
            --border: #e2e8f0; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { text-align: center; font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 0; }
        .header { background: var(--primary); padding: 35px 20px 50px; border-bottom-left-radius: 32px; border-bottom-right-radius: 32px; box-shadow: var(--shadow); }
        .header h1 { margin: 0; font-size: 20px; font-weight: 800; color: white; }
        .date-badge { background: var(--secondary); color: #000; display: inline-block; padding: 6px 14px; border-radius: 50px; font-weight: 700; font-size: 11px; margin-top: 12px; }
        
        /* LA FENÊTRE LIVE IMPOSSIBLE À BLOQUER */
        .live-container { margin: -25px auto 20px; width: 92%; max-width: 500px; height: 450px; background: white; border-radius: 24px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid var(--border); }
        iframe { width: 100%; height: 100%; border: none; }

        .card { background-color: var(--bg-card); margin: 20px auto; padding: 20px; border-radius: 24px; box-shadow: var(--shadow); max-width: 500px; width: 88%; text-align: left; border: 1px solid var(--border); }
        .moyennes-table { width: 100%; border-collapse: collapse; }
        .moyennes-table td { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .duel-card { background: linear-gradient(135deg, #d90429 0%, #800000 100%); color: white; }
        .duel-input { width: 90%; padding: 12px; margin: 5px 0; border-radius: 12px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .btn-duel { display: block; width: 100%; padding: 12px; background: var(--secondary); color: black; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; margin-top: 10px; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 20px auto; width: 90%; }
        .btn-social { padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <h1>⛽ ESSENCE ECO | SEINE-MARITIME</h1>
        <div class="date-badge" id="clock">...</div>
    </header>

    <div class="live-container">
        <iframe src="https://www.prix-carburants.gouv.fr/recherche/?departement=76"></iframe>
    </div>

    <div class="card">
        <h2 style="font-size: 16px; color: var(--accent); margin-top:0;">📊 Moyennes Nationales</h2>
        <table class="moyennes-table">
            <tr><td><b>Gazole</b></td><td style="text-align: right; font-weight: 800;">1,71 €</td></tr>
            <tr><td><b>SP95 (E5)</b></td><td style="text-align: right; font-weight: 800;">1,78 €</td></tr>
            <tr><td><b>SP95-E10</b></td><td style="text-align: right; font-weight: 800;">1,76 €</td></tr>
            <tr><td><b>SP98</b></td><td style="text-align: right; font-weight: 800;">1,83 €</td></tr>
            <tr><td><b>E85</b></td><td style="text-align: right; font-weight: 800; color: #10b981;">0,80 €</td></tr>
        </table>
    </div>

    <div style="margin:20px auto; width:90%; max-width:400px;">
        <script async="async" data-cfasync="false" src="https://pl28952288.profitablecpmratenetwork.com/37a7d91a3f21fde8a322a7a48c93a877/invoke.js"></script>
        <div id="container-37a7d91a3f21fde8a322a7a48c93a877"></div>
    </div>

    <div class="card duel-card">
        <h3>⚔️ Comparateur 50L</h3>
        <input type="number" id="p1" step="0.001" placeholder="Prix Station A" class="duel-input">
        <input type="number" id="p2" step="0.001" placeholder="Prix Station B" class="duel-input">
        <button onclick="duel()" class="btn-duel">CALCULER L'ÉCONOMIE</button>
        <div id="resDuel" style="display:none; margin-top:10px; font-weight:800; text-align:center;">
            Gain : <span id="valDuel" style="font-size: 20px;">0</span> €
        </div>
    </div>

    <div class="social-grid">
        <button onclick="copyLink()" style="grid-column: span 2; background:#334155;" class="btn-social">🔗 Copier le lien</button>
        <button onclick="shareWA()" style="background:#25D366;" class="btn-social">WhatsApp</button>
        <button onclick="shareFB()" style="background:#1877F2;" class="btn-social">Facebook</button>
    </div>

    <footer style="padding: 20px; font-size: 10px; color: #64748b;">© 2026 Observatoire National - Elyes Mahri</footer>

    <script>
        function clock() { document.getElementById('clock').innerText = "✅ " + new Date().toLocaleString('fr-FR'); }
        setInterval(clock, 1000); clock();

        function duel() {
            var p1 = document.getElementById('p1').value;
            var p2 = document.getElementById('p2').value;
            if(p1 && p2) {
                document.getElementById('valDuel').innerText = (Math.abs(p1 - p2) * 50).toFixed(2);
                document.getElementById('resDuel').style.display = 'block';
            }
        }
        function copyLink() { navigator.clipboard.writeText(window.location.href); alert('Lien copié !'); }
        function shareWA() { window.open("https://api.whatsapp.com/send?text=Prix essence : " + window.location.href); }
        function shareFB() { window.open("https://www.facebook.com/sharer/sharer.php?u=" + window.location.href); }
    </script>
</body>
</html>
